name: Nuitka Build

on:
  push:
  workflow_dispatch:

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install nuitka cryptography watchdog psutil argon2-cffi numpy

      - name: Build Linux binary
        run: |
          python -m nuitka Client.py \
            --standalone \
            --follow-imports \
            --include-module=Encryption \
            --include-module=Network \
            --include-module=Watcher \
            --include-module=util \
            --output-dir=dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/

  windows-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install nuitka cryptography watchdog psutil argon2-cffi numpy

      - name: Build Windows binary
        run: |
          python -m nuitka Client.py `
            --standalone `
            --follow-imports `
            --include-module=Encryption `
            --include-module=Network `
            --include-module=Watcher `
            --include-module=util `
            --output-dir=dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/
